<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#grad1)"/>
  
  <!-- AI Brain icon -->
  <g transform="translate(256,256)" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <!-- Brain left -->
    <path d="M-60,-80 C-90,-80 -110,-60 -110,-30 C-110,0 -90,20 -70,30 C-80,40 -90,60 -80,80 C-70,100 -40,100 -20,90"/>
    
    <!-- Brain right -->
    <path d="M60,-80 C90,-80 110,-60 110,-30 C110,0 90,20 70,30 C80,40 90,60 80,80 C70,100 40,100 20,90"/>
    
    <!-- Brain center line -->
    <path d="M0,-90 L0,80"/>
    
    <!-- Neural connections -->
    <circle cx="-50" cy="-40" r="8" fill="white"/>
    <circle cx="50" cy="-40" r="8" fill="white"/>
    <circle cx="-70" cy="10" r="8" fill="white"/>
    <circle cx="70" cy="10" r="8" fill="white"/>
    <circle cx="-40" cy="60" r="8" fill="white"/>
    <circle cx="40" cy="60" r="8" fill="white"/>
    <circle cx="0" cy="-50" r="8" fill="white"/>
    
    <!-- Connection lines -->
    <path d="M-50,-40 L0,-50 L50,-40" stroke-width="4"/>
    <path d="M-70,10 L-50,-40" stroke-width="4"/>
    <path d="M70,10 L50,-40" stroke-width="4"/>
    <path d="M-40,60 L-70,10" stroke-width="4"/>
    <path d="M40,60 L70,10" stroke-width="4"/>
    <path d="M0,-50 L0,-90" stroke-width="4"/>
  </g>
  
  <!-- D0 text -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">D0</text>
</svg>
